name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set up Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 4. Build Environment and Pull HTML Code
        run: |
          echo '{"name": "rnjmanager", "version": "1.0.0", "private": true, "dependencies": {"@capacitor/android": "^6.0.0","@capacitor/cli": "^6.0.0","@capacitor/core": "^6.0.0"}}' > package.json
          mkdir -p www
          cp index.html www/

      - name: 5. Standard Dependency Extraction
        run: npm install

      - name: 6. Hardcode Capacitor Config File Directly
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.rnj.loanmanager",
            "appName": "RNJ Loan System",
            "webDir": "www"
          }
          EOF

      - name: 7. Inject Android Native Project Shell
        run: npx cap add android

      - name: 8. Install ImageMagick and Auto-Generate Launcher Icons
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Detect your uploaded rnj-logo.jpg file
          SOURCE_ICON="rnj-logo.jpg"
          
          # Automatically resize and replace standard Android launcher icons with the RNJ logo
          RES_DIR="android/app/src/main/res"
          magick "$SOURCE_ICON" -resize 48x48     $RES_DIR/mipmap-mdpi/ic_launcher.png
          magick "$SOURCE_ICON" -resize 48x48     $RES_DIR/mipmap-mdpi/ic_launcher_round.png
          magick "$SOURCE_ICON" -resize 72x72     $RES_DIR/mipmap-hdpi/ic_launcher.png
          magick "$SOURCE_ICON" -resize 72x72     $RES_DIR/mipmap-hdpi/ic_launcher_round.png
          magick "$SOURCE_ICON" -resize 96x96     $RES_DIR/mipmap-xhdpi/ic_launcher.png
          magick "$SOURCE_ICON" -resize 96x96     $RES_DIR/mipmap-xhdpi/ic_launcher_round.png
          magick "$SOURCE_ICON" -resize 144x144   $RES_DIR/mipmap-xxhdpi/ic_launcher.png
          magick "$SOURCE_ICON" -resize 144x144   $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png
          magick "$SOURCE_ICON" -resize 192x192   $RES_DIR/mipmap-xxxhdpi/ic_launcher.png
          magick "$SOURCE_ICON" -resize 192x192   $RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png

      - name: 9. Sync Web Files to Android Structure
        run: npx cap sync android

      - name: 10. Compile App File Package (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 11. Deliver Mobile App Download Package
        uses: actions/upload-artifact@v4
        with:
          name: RNJ-LoanManager-Installer
          path: android/app/build/outputs/apk/debug/app-debug.apk
